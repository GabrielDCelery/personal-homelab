services:
  ollama:
    image: ollama/ollama:0.15.1
    container_name: ollama
    restart: unless-stopped
    networks:
      - homelab
    ports:
      - "11434:11434"
    volumes:
      - /srv/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  shadowrun-rag:
    image: ${HOMELAB_HOST}:5000/homelab/shadowrun-rag:latest
    container_name: shadowrun-rag
    restart: unless-stopped
    environment:
      - DATA_PATH=/data
      - EMBEDDING_BATCH_SIZE=100
      - EMBEDDING_MODEL=mxbai-embed-large
      - LLM_MODEL=llama3.1:8b
      # - LLM_MODEL=gemma2:9b
      # - LLM_MODEL=mistral:7b-instruct
      - JUDGE_MODEL=mistral:7b-instruct
      # - JUDGE_MODEL=llama3.1:8b
      - LOG_LEVEL=INFO
      - OLLAMA_HOST=http://ollama:11434
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TOP_K=7
    volumes:
      - /srv/shadowrun-rag/pdfs_raw:/data/pdfs_raw:ro
      - /srv/shadowrun-rag/pdfs_normalised:/data/pdfs_normalised
      - /srv/shadowrun-rag/markdown_extracted:/data/markdown_extracted
      - /srv/shadowrun-rag/markdown_clean:/data/markdown_clean
      - /srv/shadowrun-rag/markdown_stripped:/data/markdown_stripped
      - /srv/shadowrun-rag/evals:/data/evals
      - /srv/shadowrun-rag/chroma_db:/data/chroma_db
      - /srv/shadowrun-rag/model_cache:/home/app/.cache
    networks:
      - homelab
    depends_on:
      - ollama
    # Override command to keep running for manual exec
    command: tail -f /dev/null
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  comfyui:
    image: yanwk/comfyui-boot:cu128-slim
    container_name: comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - /srv/comfyui/cache/dot-cache:/root/.cache
      - /srv/comfyui/cache/dot-config:/root/.config
      - /srv/comfyui/nodes/dot-local:/root/.local
      - /srv/comfyui/nodes/custom_nodes:/root/ComfyUI/custom_nodes
      - /srv/comfyui/models/models:/root/ComfyUI/models
      - /srv/comfyui/models/hf-hub:/root/.cache/huggingface/hub
      - /srv/comfyui/models/torch-hub:/root/.cache/torch/hub
      - /srv/comfyui/user/input:/root/ComfyUI/input
      - /srv/comfyui/user/output:/root/ComfyUI/output
      - /srv/comfyui/user/user-profile:/root/ComfyUI/user
      - /srv/comfyui/user/user-scripts:/root/user-scripts
    environment:
      - CLI_ARGS=
    networks:
      - homelab
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  filebrowser:
    image: filebrowser/filebrowser:v2.63.2-s6
    container_name: filebrowser
    restart: unless-stopped
    environment:
      - PUID=${HOMELAB_PUID}
      - PGID=${HOMELAB_PGID}
    ports:
      - "8080:80"
    volumes:
      - /srv/shadowrun-rag/pdfs_raw:/srv/shadowrun-rag/pdfs_raw
      - /srv/shadowrun-rag/pdfs_normalised:/srv/shadowrun-rag/pdfs_normalised:ro
      - /srv/shadowrun-rag/markdown_extracted:/srv/shadowrun-rag/markdown_extracted:ro
      - /srv/shadowrun-rag/markdown_clean:/srv/shadowrun-rag/markdown_clean:ro
      - /srv/shadowrun-rag/markdown_stripped:/srv/shadowrun-rag/markdown_stripped:ro
      - /srv/shadowrun-rag/evals:/srv/shadowrun-rag/evals:ro
      - filebrowser_data:/srv
      - filebrowser_database:/database
      - filebrowser_config:/config
      - /srv/comfyui/user/output:/srv/comfyui/user/output:ro
    networks:
      - homelab

networks:
  homelab:
    external: true


volumes:
  filebrowser_data:
  filebrowser_database:
  filebrowser_config:
