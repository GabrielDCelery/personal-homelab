services:
  ollama:
    image: ollama/ollama:0.15.1
    container_name: ollama
    restart: unless-stopped
    networks:
      - homelab
    ports:
      - "11434:11434"
    volumes:
      - /srv/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  shadowrun-rag:
    image: ${HOMELAB_HOST}:5000/homelab/shadowrun-rag:latest
    container_name: shadowrun-rag
    restart: unless-stopped
    environment:
      - DATA_PATH=/data
      - EMBEDDING_BATCH_SIZE=100
      - EMBEDDING_MODEL=mxbai-embed-large
      - LLM_MODEL=llama3.1:8b
      - LOG_LEVEL=INFO
      - OLLAMA_HOST=http://ollama:11434
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TOP_K=7
    volumes:
      - /srv/shadowrun-rag/pdfs_raw:/data/pdfs_raw:ro
      - /srv/shadowrun-rag/pdfs_normalised:/data/pdfs_normalised
      - /srv/shadowrun-rag/markdown:/data/markdown
      - /srv/shadowrun-rag/chroma_db:/data/chroma_db
      - /srv/shadowrun-rag/model_cache:/home/app/.cache
    networks:
      - homelab
    depends_on:
      - ollama
    # Override command to keep running for manual exec
    command: tail -f /dev/null
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  filebrowser:
    image: filebrowser/filebrowser:v2.63.2-s6
    container_name: filebrowser
    restart: unless-stopped
    environment:
      - PUID=${HOMELAB_PUID}
      - PGID=${HOMELAB_PGID}
    ports:
      - "8080:80"
    volumes:
      - /srv/shadowrun-rag/pdfs_raw:/srv/shadowrun-rag/pdfs_raw
      - /srv/shadowrun-rag/pdfs_normalised:/srv/shadowrun-rag/pdfs_normalised:ro
      - /srv/shadowrun-rag/markdown:/srv/shadowrun-rag/markdown:ro
      - filebrowser_data:/srv
      - filebrowser_database:/database
      - filebrowser_config:/config
    networks:
      - homelab

networks:
  homelab:
    external: true


volumes:
  filebrowser_data:
  filebrowser_database:
  filebrowser_config:
