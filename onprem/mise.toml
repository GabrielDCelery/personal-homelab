[tools]
ansible = "13.2.0"

[env]
_.file = { path = "{{config_root}}/.env" }

[tasks."ansible:deploy"]
dir = "{{config_root}}/ansible"
usage = 'arg "[tags]" help="Ansible tags to run (optional)"'
run = '''
#!/usr/bin/env bash
if [[ -n "${usage_tags:-}" ]]; then
  ansible-playbook -i inventory.yaml playbook.yaml --tags "$usage_tags"
else
  ansible-playbook -i inventory.yaml playbook.yaml
fi
'''

[tasks.bootstrap]
description = "Bootstrap dev environment"
run = """
docker context update homelab --docker \"host=ssh://$HOMELAB_USER@$HOMELAB_HOST\" 2>/dev/null || \
docker context create homelab --docker \"host=ssh://$HOMELAB_USER@$HOMELAB_HOST\"
docker context use homelab
"""

[tasks."docker:deploy:infra"]
dir = "{{ config_root }}/infra"
run = """
docker compose pull
docker compose up -d
"""

[tasks."docker:deploy:services"]
dir = "{{ config_root }}/services"
run = """
docker compose pull
docker compose up -d
"""
