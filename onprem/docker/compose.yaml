# docker run --rm -v ollama-models:/root/.ollama --gpus=all -p 11434:11434 --name ollama ollama/ollama:0.15.1
services:
  ollama:
    image: ollama/ollama:0.15.1
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # https://docs.docker.com/compose/how-tos/gpu-support
    networks:
      - ollama_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama-models:
    external: true
  netdataconfig:
    external: true
  netdatalib:
    external: true
  netdatacache:
    external: true


networks:
  ollama_net:
    external: true

