- name: Set up homelab
  hosts: homelabdesktop
  vars:
    target_user: "{{ lookup('env', 'HOMELAB_USER') }}"
  roles:
    - role: info
      tags: info
    # No need to install mise because it is unnecessary overhead, installing everything using docker
    # - role: mise
    #   tags: mise
    - role: docker
      tags: docker
    - role: nvidia_driver
      tags: nvidia_driver
    - role: nvidia_container_toolkit
      tags: nvidia_container_toolkit
    - role: homelab
      tags: homelab
    - role: git
      tags: git
    - role: registry
      tags: registry
    - role: ollama
      tags: ollama
    - role: shadowrun-rag
      tags: shadowrun-rag
    - role: comfyui
      tags: comfyui

